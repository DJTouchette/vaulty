baseURL = "https://djtouchette.github.io/vaulty/"
languageCode = "en-us"
title = "Vaulty"
theme = "hugo-book"

# Book theme configuration
[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "docs"
  BookRepo = "https://github.com/djtouchette/vaulty"
  BookEditPath = "edit/main/docs-site/content"
  BookDateFormat = "January 2, 2006"
  BookSearch = true
  BookComments = false
  BookLogo = "/images/vaulty-logo.svg"
  description = "A local-only CLI daemon that acts as a secrets proxy for AI coding agents."

[markup]
  [markup.highlight]
    style = "github-dark"
    lineNos = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.after]]
    name = "GitHub"
    url = "https://github.com/djtouchette/vaulty"
    weight = 10
