services:
  web:
    image: myapp:latest
    ports:
      - "3000:3000"
    environment:
      API_KEY: ${API_KEY:-changeme}
      DATABASE_URL: ${DATABASE_URL:-postgres://localhost/mydb}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379}

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
